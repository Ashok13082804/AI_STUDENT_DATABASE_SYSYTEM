<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - AI Student Database</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>

<body class="page-login">
  <div class="container" style="max-width: 500px; margin-top: 100px;">
    <div class="glass-card">
      <div style="text-align: center; margin-bottom: 20px;">
        <span class="ai-badge">Secure AI Access</span>
      </div>
      <h1>Admin Login</h1>

      {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
      {% for category, message in messages %}
      <div class="flash flash-{{ category }}">{{ message }}</div>
      {% endfor %}
      {% endif %}
      {% endwith %}

      <form action="{{ url_for('login') }}" method="post">
        <div class="form-group">
          <label for="username">Username</label>
          <input type="text" name="username" id="username" placeholder="Enter admin username" required>
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" name="password" id="password" placeholder="••••••••" required>
        </div>
        <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 10px;">Sign In</button>
      </form>

      <div style="margin-top: 30px; text-align: center; border-top: 1px solid var(--glass-border); padding-top: 20px;">
        <a href="{{ url_for('forgot_password') }}"
          style="color: #94a3b8; text-decoration: none; font-size: 0.9rem;">Forgot Password?</a>
      </div>
    </div>
  </div>
</body>

</html>
