<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Change Password - AI Student Database</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>

<body class="page-login">
    <div class="container" style="max-width: 500px; margin-top: 100px;">
        <div class="glass-card">
            <h1>Reset Password</h1>

            {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
            {% for category, message in messages %}
            <div class="flash flash-{{ category }}">{{ message }}</div>
            {% endfor %}
            {% endif %}
            {% endwith %}

            <form action="{{ url_for('change_password') }}" method="post">
                <div class="form-group">
                    <label for="username">Confirm Username</label>
                    <input type="text" name="username" id="username" placeholder="Type your username" required>
                </div>
                <div class="form-group">
                    <label for="password">New Password</label>
                    <input type="password" name="password" id="password" placeholder="Enter new password" required>
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 10px;">Update
                    Password</button>
            </form>

            <div style="margin-top: 20px; text-align: center;">
                <a href="{{ url_for('login') }}" style="color: #94a3b8; text-decoration: none; font-size: 0.9rem;">Back
                    to Login</a>
            </div>
        </div>
    </div>
</body>

</html>
